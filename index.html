<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="description" content="Minuteur Pomodoro minimaliste avec notifications, sons et statistiques. Productivité simplifiée." />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#08090d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Chronoflow" />
  <meta property="og:title" content="Chronoflow - Focus Timer" />
  <meta property="og:description" content="Minuteur Pomodoro minimaliste avec notifications et sons" />
  <meta property="og:url" content="https://chronoflow.vercel.app/" />
  <meta property="og:type" content="website" />
  <meta name="color-scheme" content="light dark" />
  <meta name="keywords" content="pomodoro, timer, productivity, focus, deep work" />
  <title>Chronoflow - Minuteur de productivité</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23ff6b6b'/><circle cx='50' cy='50' r='40' fill='%232d2d2d'/><path d='M50,20 L50,50 L75,65' stroke='%23ff6b6b' stroke-width='4' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><circle cx='90' cy='90' r='85' fill='%23ff6b6b'/><circle cx='90' cy='90' r='75' fill='%232d2d2d'/><path d='M90,30 L90,90 L120,115' stroke='%23ff6b6b' stroke-width='6' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>" />
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "Chronoflow",
    "description": "Minimalist focus timer for deep work and productivity",
    "applicationCategory": "Productivity",
    "operatingSystem": "Web",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    }
  }
  </script>
  <style>
    :root {
      --bg: #08090d;
      --panel: rgba(24, 24, 27, 0.34);
      --panel-border: rgba(255, 255, 255, 0.06);
      --text: #f4f4f5;
      --muted: #52525b;
      --button: #ffffff;
      --button-text: #09090b;
      --button-alt: rgba(255, 255, 255, 0.06);
      --button-alt-text: #f4f4f5;
      --focus: #6366f1;
      --pause: #10b981;
      --glow: rgba(99, 102, 241, 0.06);
      --error: #ef4444;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f9fafb;
        --panel: rgba(255, 255, 255, 0.7);
        --panel-border: rgba(0, 0, 0, 0.1);
        --text: #1f2937;
        --muted: #4b5563;
        --button: #09090b;
        --button-text: #ffffff;
        --button-alt: rgba(0, 0, 0, 0.05);
        --button-alt-text: #1f2937;
      }
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      overflow-x: hidden;
      transition: background-color 200ms ease, color 200ms ease;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
    }

    .glow {
      position: absolute;
      width: 120vw;
      height: 120vw;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border-radius: 9999px;
      background: var(--glow);
      filter: blur(120px);
      pointer-events: none;
      transition: background-color 300ms ease;
      will-change: background-color;
    }

    .card {
      width: 100%;
      max-width: 390px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 36px;
      padding: 22px;
      backdrop-filter: blur(12px);
      box-shadow: 0 32px 64px -12px rgba(0,0,0,0.6);
      position: relative;
      z-index: 1;
    }

    .presets {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 22px;
      padding: 4px;
      background: rgba(0,0,0,0.38);
      border: 1px solid rgba(255,255,255,0.03);
      border-radius: 18px;
    }

    .preset-btn {
      border: 0;
      border-radius: 14px;
      padding: 12px 10px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.01em;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: transform 160ms ease, background-color 160ms ease, color 160ms ease;
    }

    .preset-btn:active,
    .action:active,
    .icon-btn:active {
      transform: scale(0.98);
    }

    .preset-btn:focus-visible,
    .action:focus-visible,
    .icon-btn:focus-visible,
    .mini:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 2px;
    }

    .preset-btn.active {
      background: rgba(255,255,255,0.10);
      color: #fff;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .timer-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      max-width: 280px;
      margin: 0 auto 22px;
      display: grid;
      place-items: center;
    }

    .timer-svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .ring-bg {
      stroke: rgba(255,255,255,0.015);
      stroke-width: 4;
      fill: none;
    }

    .ring {
      stroke-width: 4;
      fill: none;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.3s ease, stroke 0.3s ease;
    }

    .center {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 10px;
    }

    .time {
      font-size: clamp(48px, 13vw, 62px);
      line-height: 1;
      font-weight: 300;
      letter-spacing: -0.06em;
      font-variant-numeric: tabular-nums;
      color: #fff;
    }

    @media (prefers-color-scheme: light) {
      .time {
        color: #1f2937;
      }
    }

    .badge {
      min-height: 24px;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      border: 1px solid rgba(255,255,255,0.05);
      background: rgba(255,255,255,0.05);
      color: #d4d4d8;
    }

    .actions {
      display: flex;
      gap: 12px;
      width: 100%;
    }

    .action,
    .icon-btn {
      border: 0;
      height: 56px;
      border-radius: 18px;
      cursor: pointer;
      transition: transform 160ms ease, background-color 160ms ease, color 160ms ease, border-color 160ms ease;
    }

    .action {
      flex: 1;
      background: var(--button);
      color: var(--button-text);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.02em;
      box-shadow: 0 12px 30px rgba(0,0,0,0.22);
    }

    .action:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.3);
    }

    .action.paused {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      color: #fff;
    }

    .icon-btn {
      width: 56px;
      background: var(--button-alt);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--button-alt-text);
      font-size: 15px;
      font-weight: 700;
    }

    .icon-btn:hover {
      background: rgba(255,255,255,0.12);
    }

    .small-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-top: 14px;
    }

    .mini {
      flex: 1;
      height: 44px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: #d4d4d8;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 160ms ease, background-color 160ms ease;
    }

    .mini:hover {
      background: rgba(255,255,255,0.08);
    }

    .mini:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .settings {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .setting {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.03);
      color: #d4d4d8;
      font-size: 12px;
      font-weight: 600;
    }

    .setting input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--focus);
      cursor: pointer;
    }

    .setting input[type="checkbox"]:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 2px;
    }

    .stats {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat-box {
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.03);
      text-align: center;
      font-size: 11px;
    }

    .stat-box .label {
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-box .value {
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      margin-top: 4px;
    }

    @media (prefers-color-scheme: light) {
      .stat-box .value {
        color: #1f2937;
      }
    }

    .footer-note {
      margin-top: 12px;
      color: #71717a;
      font-size: 11px;
      text-align: center;
      line-height: 1.35;
      min-height: 16px;
    }

    .footer-note.error {
      color: var(--error);
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 360px) {
      .card {
        padding: 16px;
      }

      .time {
        font-size: clamp(40px, 12vw, 56px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="glow" id="glow"></div>

  <main class="card" role="main">
    <section class="presets" aria-label="Présets de durée">
      <button class="preset-btn active" id="preset-25" type="button" aria-label="Session de 25 minutes">25 min</button>
      <button class="preset-btn" id="preset-50" type="button" aria-label="Session de 50 minutes">50 min</button>
      <button class="preset-btn" id="preset-10" type="button" aria-label="Session de 10 minutes">10 min</button>
    </section>

    <section class="timer-wrap" aria-label="Minuteur">
      <svg class="timer-svg" viewBox="0 0 200 200" aria-hidden="true">
        <circle class="ring-bg" cx="100" cy="100" r="90"></circle>
        <circle id="progress" class="ring" cx="100" cy="100" r="90" stroke="#ffffff" stroke-dasharray="565.48" stroke-dashoffset="0"></circle>
      </svg>
      <div class="center">
        <div id="time" class="time" role="status" aria-live="polite" aria-atomic="true">25:00</div>
        <div id="badge" class="badge" role="status" aria-live="polite" aria-atomic="true">FOCUS SESSION</div>
      </div>
    </section>

    <section class="actions">
      <button id="mainBtn" class="action" type="button" aria-label="Démarrer le minuteur">DEBUTER</button>
      <button class="icon-btn" type="button" aria-label="Réinitialiser le minuteur">⟲</button>
    </section>

    <section class="small-row">
      <button class="mini" type="button" aria-label="Diminuer de 1 minute">-1 MIN</button>
      <button class="mini" type="button" aria-label="Augmenter de 1 minute">+1 MIN</button>
    </section>

    <section class="settings">
      <label class="setting">
        <span>Notif</span>
        <input id="notifToggle" type="checkbox" aria-label="Activer les notifications" />
      </label>
      <label class="setting">
        <span>Son</span>
        <input id="soundToggle" type="checkbox" checked aria-label="Activer les sons" />
      </label>
    </section>

    <section class="stats">
      <div class="stat-box">
        <div class="label">Complétés</div>
        <div class="value" id="completedSessions">0</div>
      </div>
      <div class="stat-box">
        <div class="label">Temps total</div>
        <div class="value" id="totalTime">0h</div>
      </div>
    </section>

    <div id="note" class="footer-note" role="status" aria-live="polite" aria-atomic="true"></div>
  </main>

  <script>
    /**
     * Chronoflow - Minimalist Focus Timer
     * A distraction-free Pomodoro timer with offline support
     */

    // Constants
    const PRESETS = {
      25: { work: 25 * 60, break: 5 * 60, color: '#6366f1', glow: 'rgba(99,102,241,0.06)' },
      50: { work: 50 * 60, break: 10 * 60, color: '#f59e0b', glow: 'rgba(245,158,11,0.06)' },
      10: { work: 10 * 60, break: 2 * 60, color: '#06b6d4', glow: 'rgba(6,182,212,0.06)' }
    };

    const STORAGE_KEY = 'pomodoro_single_html_v3';
    const circumference = 2 * Math.PI * 90;

    // State
    let currentPreset = 25;
    let currentPhase = 'work';
    let isActive = false;
    let timeLeft = PRESETS[25].work;
    let endTime = 0;
    let loop = null;
    let wakeLock = null;
    let completedSessions = 0;
    let totalTimeSpent = 0;
    let audioCtx = null;

    // Utility: DOM element getter
    const $ = (id) => document.getElementById(id);

    /**
     * Initialize or get AudioContext
     * @returns {AudioContext|null} The AudioContext or null if unavailable
     */
    const initAudioContext = () => {
      if (audioCtx) return audioCtx;

      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) {
        console.warn('Web Audio API not supported');
        return null;
      }

      try {
        audioCtx = new AudioContextClass();
        return audioCtx;
      } catch (e) {
        console.error('Failed to create AudioContext:', e);
        return null;
      }
    };

    /**
     * Display a note/message to the user
     * @param {string} msg - Message to display
     * @param {boolean} isError - Whether to style as error
     */
    function setNote(msg, isError = false) {
      const noteEl = $('note');
      noteEl.textContent = msg || '';
      noteEl.classList.toggle('error', isError);
    }

    /**
     * Play a beep sound (work or break)
     * @param {boolean} isBreak - Whether this is a break phase
     */
    function beep(isBreak) {
      const soundToggle = $('soundToggle');
      if (!soundToggle?.checked) return;

      const ctx = initAudioContext();
      if (!ctx) {
        console.warn('Audio context unavailable, skipping beep');
        return;
      }

      try {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(isBreak ? 659.25 : 523.25, ctx.currentTime);
        gain.gain.setValueAtTime(0.12, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.55);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.55);
      } catch (e) {
        console.error('Beep failed:', e);
      }
    }

    /**
     * Check if notifications can be displayed
     * @returns {boolean} Whether notifications are available and enabled
     */
    function canNotify() {
      return $('notifToggle').checked && 'Notification' in window && Notification.permission === 'granted';
    }

    /**
     * Request notification permission from user
     * @returns {Promise<boolean>} Whether permission was granted
     */
    async function requestNotificationPermission() {
      if (!('Notification' in window)) {
        setNote('Notifications non supportées', true);
        return false;
      }
      if (Notification.permission === 'granted') return true;
      if (Notification.permission === 'denied') {
        setNote('Notifications refusées. Vérifiez les paramètres.', true);
        return false;
      }
      try {
        const result = await Notification.requestPermission();
        if (result === 'granted') {
          setNote('Notifications activées ✓');
          return true;
        } else {
          setNote('Notifications refusées', true);
          return false;
        }
      } catch (e) {
        setNote('Erreur permission notifications', true);
        return false;
      }
    }

    /**
     * Toggle notification preference and request permission if needed
     */
    async function toggleNotifications() {
      const isChecked = $('notifToggle').checked;

      if (isChecked && Notification.permission !== 'granted') {
        const permitted = await requestNotificationPermission();
        if (!permitted) {
          $('notifToggle').checked = false;
          return;
        }
      }

      saveState();
    }

    /**
     * Display a system notification
     * @param {string} title - Notification title
     * @param {string} body - Notification body
     */
    function showNotification(title, body) {
      if (!canNotify()) return;
      try {
        new Notification(title, {
          body,
          tag: 'pomodoro',
          badge: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="%23ff6b6b"/></svg>'
        });
      } catch (e) {
        console.error('Notification failed:', e);
      }
    }

    /**
     * Request screen wake lock
     */
    async function requestWake() {
      if ('wakeLock' in navigator) {
        try {
          wakeLock = await navigator.wakeLock.request('screen');
        } catch (e) {
          console.warn('Wake Lock request failed:', e);
        }
      }
    }

    /**
     * Release screen wake lock
     */
    async function releaseWake() {
      if (wakeLock) {
        try {
          await wakeLock.release();
        } catch (e) {
          console.warn('Wake Lock release failed:', e);
        }
        wakeLock = null;
      }
    }

    /**
     * Update the progress ring visualization
     */
    function updateRing() {
      const total = currentPhase === 'work' ? PRESETS[currentPreset].work : PRESETS[currentPreset].break;
      const offset = circumference - (Math.max(0, timeLeft) / total) * circumference;
      $('progress').style.strokeDashoffset = offset;
    }

    /**
     * Format seconds to human-readable time
     * @param {number} seconds - Time in seconds
     * @returns {string} Formatted time string
     */
    function formatTime(seconds) {
      const hours = Math.floor(seconds / 3600);
      const mins = Math.floor((seconds % 3600) / 60);
      if (hours > 0) return `${hours}h${mins}m`;
      return `${mins}m`;
    }

    /**
     * Update stats display
     */
    function updateStats() {
      $('completedSessions').textContent = completedSessions;
      $('totalTime').textContent = formatTime(totalTimeSpent);
    }

    /**
     * Render the UI with current state
     */
    function render() {
      const m = Math.floor(Math.max(0, timeLeft) / 60).toString().padStart(2, '0');
      const s = (Math.max(0, timeLeft) % 60).toString().padStart(2, '0');
      $('time').textContent = `${m}:${s}`;

      const cfg = PRESETS[currentPreset];
      if (currentPhase === 'work') {
        $('progress').setAttribute('stroke', cfg.color);
        $('badge').textContent = 'FOCUS SESSION';
        $('badge').style.background = 'rgba(255,255,255,0.05)';
        $('badge').style.color = '#d4d4d8';
        $('badge').style.borderColor = 'rgba(255,255,255,0.05)';
        $('glow').style.background = cfg.glow;
      } else {
        $('progress').setAttribute('stroke', '#10b981');
        $('badge').textContent = 'PAUSE';
        $('badge').style.background = 'rgba(16,185,129,0.10)';
        $('badge').style.color = '#6ee7b7';
        $('badge').style.borderColor = 'rgba(16,185,129,0.12)';
        $('glow').style.background = 'rgba(16,185,129,0.06)';
      }

      if (isActive) {
        $('mainBtn').textContent = 'PAUSE';
        $('mainBtn').classList.add('paused');
      } else {
        $('mainBtn').textContent = 'DEBUTER';
        $('mainBtn').classList.remove('paused');
      }

      [25, 50, 10].forEach(v => {
        const btn = $('preset-' + v);
        if (btn) btn.classList.toggle('active', v === currentPreset);
      });

      updateRing();
    }

    /**
     * Save application state to localStorage
     */
    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        currentPreset,
        currentPhase,
        isActive,
        timeLeft: Math.max(0, timeLeft),
        endTime,
        notif: $('notifToggle')?.checked,
        sound: $('soundToggle')?.checked ?? true,
        completedSessions,
        totalTimeSpent
      }));
    }

    /**
     * Load application state from localStorage
     */
    function loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) {
        timeLeft = PRESETS[currentPreset].work;
        render();
        updateStats();
        return;
      }

      try {
        const state = JSON.parse(raw);
        currentPreset = state.currentPreset || 25;
        currentPhase = state.currentPhase || 'work';
        isActive = !!state.isActive;
        timeLeft = typeof state.timeLeft === 'number' ? Math.max(0, state.timeLeft) : PRESETS[currentPreset].work;
        endTime = typeof state.endTime === 'number' ? state.endTime : 0;
        completedSessions = typeof state.completedSessions === 'number' ? state.completedSessions : 0;
        totalTimeSpent = typeof state.totalTimeSpent === 'number' ? state.totalTimeSpent : 0;

        const notifToggle = $('notifToggle');
        const soundToggle = $('soundToggle');
        if (notifToggle) notifToggle.checked = !!state.notif;
        if (soundToggle) soundToggle.checked = state.sound !== false;

        if (isActive && endTime > Date.now()) {
          timeLeft = Math.ceil((endTime - Date.now()) / 1000);
          startLoop();
          requestWake();
        } else if (isActive && endTime <= Date.now()) {
          catchUp();
        } else {
          isActive = false;
          timeLeft = Math.max(0, timeLeft);
        }
      } catch (e) {
        console.error('Failed to load state:', e);
        currentPreset = 25;
        currentPhase = 'work';
        isActive = false;
        timeLeft = PRESETS[25].work;
      }

      render();
      updateStats();
    }

    /**
     * Select a preset duration
     * @param {number} minutes - Preset duration in minutes
     */
    function selectPreset(minutes) {
      if (isActive) return;
      currentPreset = minutes;
      currentPhase = 'work';
      timeLeft = PRESETS[minutes].work;
      setNote('');
      saveState();
      render();
    }

    /**
     * Adjust time by delta
     * @param {number} delta - Time change in seconds
     */
    function adjustTime(delta) {
      if (isActive) return;
      timeLeft = Math.max(60, timeLeft + delta);
      setNote('');
      saveState();
      render();
    }

    /**
     * Start the timer loop
     */
    function startLoop() {
      stopLoop();
      loop = setInterval(() => {
        const now = Date.now();
        if (now >= endTime) {
          catchUp();
        } else {
          timeLeft = Math.ceil((endTime - now) / 1000);
          render();
        }
      }, 500);
    }

    /**
     * Stop the timer loop
     */
    function stopLoop() {
      if (loop) clearInterval(loop);
      loop = null;
    }

    /**
     * Handle timer completion and phase transitions
     */
    function catchUp() {
      const now = Date.now();

      while (isActive && now >= endTime) {
        if (currentPhase === 'work') {
          currentPhase = 'break';
          const breakDuration = PRESETS[currentPreset].break;
          endTime = endTime + (breakDuration * 1000);
          timeLeft = Math.max(0, Math.ceil((endTime - now) / 1000));
          completedSessions++;
          totalTimeSpent += PRESETS[currentPreset].work;
          beep(true);
          if (navigator.vibrate) navigator.vibrate([180, 80, 180]);
          showNotification('Chronoflow', 'Session terminée. Pause commencée.');
        } else {
          isActive = false;
          currentPhase = 'work';
          timeLeft = PRESETS[currentPreset].work;
          endTime = 0;
          beep(false);
          if (navigator.vibrate) navigator.vibrate(300);
          showNotification('Chronoflow', 'Pause terminée. Retour au focus.');
          releaseWake();
          break;
        }
      }

      if (isActive) {
        timeLeft = Math.max(0, Math.ceil((endTime - now) / 1000));
        startLoop();
      } else {
        stopLoop();
      }

      saveState();
      updateStats();
      render();
    }

    /**
     * Toggle timer start/pause
     */
    async function toggleTimer() {
      if (isActive) {
        isActive = false;
        stopLoop();
        timeLeft = Math.max(0, Math.ceil((endTime - Date.now()) / 1000));
        endTime = 0;
        releaseWake();
        setNote('Pause manuelle');
      } else {
        if ($('notifToggle')?.checked && Notification.permission !== 'granted') {
          const permitted = await requestNotificationPermission();
          if (!permitted) {
            const toggle = $('notifToggle');
            if (toggle) toggle.checked = false;
          }
        }
        isActive = true;
        endTime = Date.now() + (timeLeft * 1000);
        beep(currentPhase === 'break');
        startLoop();
        requestWake();
        setNote('');
      }
      saveState();
      render();
    }

    /**
     * Reset timer to initial state
     */
    function resetTimer() {
      isActive = false;
      stopLoop();
      currentPhase = 'work';
      timeLeft = PRESETS[currentPreset].work;
      endTime = 0;
      releaseWake();
      setNote('Réinitialisé');
      saveState();
      render();
    }

    // Event Listeners
    document.getElementById('preset-25')?.addEventListener('click', () => selectPreset(25));
    document.getElementById('preset-50')?.addEventListener('click', () => selectPreset(50));
    document.getElementById('preset-10')?.addEventListener('click', () => selectPreset(10));

    document.getElementById('mainBtn')?.addEventListener('click', toggleTimer);
    document.querySelectorAll('.icon-btn').forEach(btn => {
      btn.addEventListener('click', resetTimer);
    });

    document.querySelectorAll('.mini').forEach((btn, index) => {
      btn.addEventListener('click', () => adjustTime(index === 0 ? -60 : 60));
    });

    document.getElementById('notifToggle')?.addEventListener('change', toggleNotifications);
    document.getElementById('soundToggle')?.addEventListener('change', saveState);

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && isActive) {
        catchUp();
      }
    });

    window.addEventListener('focus', () => {
      if (isActive) catchUp();
    });

    window.addEventListener('beforeunload', () => {
      saveState();
    });

    // Initialize
    loadState();
  </script>
</body>
</html>
