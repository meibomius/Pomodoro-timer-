<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="description" content="Minimalist Pomodoro timer with notifications and statistics. Simplified productivity." />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#08090d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Chronoflow" />
  <meta property="og:title" content="Chronoflow - Focus Timer" />
  <meta property="og:description" content="Minimalist Pomodoro timer with notifications and statistics" />
  <meta property="og:url" content="https://pomodoro-timer-3rup.vercel.app/" />
  <meta property="og:type" content="website" />
  <meta name="color-scheme" content="light dark" />
  <meta name="keywords" content="pomodoro, timer, productivity, focus, deep work" />
  <title>Chronoflow - Productivity Timer</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3Cstyle%3E.timer-bg%7Bfill:%23ff6b6b;%7D.timer-inner%7Bfill:%23ffffff;opaci[...]" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Cdefs%3E%3Cstyle%3E.timer-bg%7Bfill:%236366f1;%7D.timer-inner%7Bfill:%23[...]" />
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "Chronoflow",
    "description": "Minimalist focus timer for deep work and productivity",
    "applicationCategory": "Productivity",
    "operatingSystem": "Web",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    }
  }
  </script>
  <style>
    :root {
      --bg: #08090d;
      --panel: rgba(24, 24, 27, 0.34);
      --panel-border: rgba(255, 255, 255, 0.06);
      --text: #f4f4f5;
      --muted: #52525b;
      --button: #ffffff;
      --button-text: #09090b;
      --button-alt: rgba(255, 255, 255, 0.06);
      --button-alt-text: #f4f4f5;
      --focus: #6366f1;
      --pause: #10b981;
      --glow: rgba(99, 102, 241, 0.06);
      --error: #ef4444;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f9fafb;
        --panel: rgba(255, 255, 255, 0.7);
        --panel-border: rgba(0, 0, 0, 0.1);
        --text: #1f2937;
        --muted: #4b5563;
        --button: #09090b;
        --button-text: #ffffff;
        --button-alt: rgba(0, 0, 0, 0.05);
        --button-alt-text: #1f2937;
      }
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      overflow-x: hidden;
      transition: background-color 200ms ease, color 200ms ease;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
    }

    .glow {
      position: absolute;
      width: 120vw;
      height: 120vw;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border-radius: 9999px;
      background: var(--glow);
      filter: blur(120px);
      pointer-events: none;
      transition: background-color 300ms ease;
      will-change: background-color;
    }

    .card {
      width: 100%;
      max-width: 390px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 36px;
      padding: 22px;
      backdrop-filter: blur(12px);
      box-shadow: 0 32px 64px -12px rgba(0,0,0,0.6);
      position: relative;
      z-index: 1;
    }

    .presets {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 22px;
      padding: 4px;
      background: rgba(0,0,0,0.38);
      border: 1px solid rgba(255,255,255,0.03);
      border-radius: 18px;
    }

    .preset-btn {
      border: 0;
      border-radius: 14px;
      padding: 12px 10px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.01em;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: transform 160ms ease, background-color 160ms ease, color 160ms ease;
    }

    .preset-btn:active,
    .action:active,
    .icon-btn:active {
      transform: scale(0.98);
    }

    .preset-btn:focus-visible,
    .action:focus-visible,
    .icon-btn:focus-visible,
    .mini:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 2px;
    }

    .preset-btn.active {
      background: rgba(255,255,255,0.10);
      color: #fff;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .timer-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      max-width: 280px;
      margin: 0 auto 22px;
      display: grid;
      place-items: center;
    }

    .timer-svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .ring-bg {
      stroke: rgba(255,255,255,0.015);
      stroke-width: 4;
      fill: none;
    }

    .ring {
      stroke-width: 4;
      fill: none;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.3s ease, stroke 0.3s ease;
    }

    .center {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 10px;
    }

    .time {
      font-size: clamp(48px, 13vw, 62px);
      line-height: 1;
      font-weight: 300;
      letter-spacing: -0.06em;
      font-variant-numeric: tabular-nums;
      color: #fff;
    }

    @media (prefers-color-scheme: light) {
      .time {
        color: #1f2937;
      }
    }

    .badge {
      min-height: 24px;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      border: 1px solid rgba(255,255,255,0.05);
      background: rgba(255,255,255,0.05);
      color: #d4d4d8;
    }

    .actions {
      display: flex;
      gap: 12px;
      width: 100%;
    }

    .action,
    .icon-btn {
      border: 0;
      height: 56px;
      border-radius: 18px;
      cursor: pointer;
      transition: transform 160ms ease, background-color 160ms ease, color 160ms ease, border-color 160ms ease;
    }

    .action {
      flex: 1;
      background: var(--button);
      color: var(--button-text);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.02em;
      box-shadow: 0 12px 30px rgba(0,0,0,0.22);
    }

    .action:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.3);
    }

    .action.paused {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      color: #fff;
    }

    .icon-btn {
      width: 56px;
      background: var(--button-alt);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--button-alt-text);
      font-size: 15px;
      font-weight: 700;
    }

    .icon-btn:hover {
      background: rgba(255,255,255,0.12);
    }

    .small-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-top: 14px;
    }

    .mini {
      flex: 1;
      height: 44px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: #d4d4d8;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 160ms ease, background-color 160ms ease;
    }

    .mini:hover {
      background: rgba(255,255,255,0.08);
    }

    .mini:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .stats {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat-box {
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.03);
      text-align: center;
      font-size: 11px;
    }

    .stat-box .label {
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-box .value {
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      margin-top: 4px;
    }

    @media (prefers-color-scheme: light) {
      .stat-box .value {
        color: #1f2937;
      }
    }

    .footer-note {
      margin-top: 12px;
      color: #71717a;
      font-size: 11px;
      text-align: center;
      line-height: 1.35;
      min-height: 16px;
    }

    .footer-note.error {
      color: var(--error);
    }

    .hidden {
      display: none !important;
    }

    .clear-data-btn {
      width: 100%;
      height: 40px;
      margin-top: 10px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(239, 68, 68, 0.15);
      color: #fca5a5;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 160ms ease, background-color 160ms ease;
    }

    .clear-data-btn:hover {
      background: rgba(239, 68, 68, 0.25);
    }

    .clear-data-btn:active {
      transform: scale(0.98);
    }

    /* Modal Overlay */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-content {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      padding: 28px;
      max-width: 360px;
      width: 100%;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
      animation: slideUp 300ms ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text);
    }

    .modal-description {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    .modal-btn {
      padding: 10px 20px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: var(--button-alt-text);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 160ms ease;
    }

    .modal-btn:hover {
      background: rgba(255,255,255,0.08);
    }

    .modal-btn.primary {
      background: var(--button);
      color: var(--button-text);
    }

    .modal-btn.primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
    }

    @media (max-width: 360px) {
      .card {
        padding: 16px;
      }

      .time {
        font-size: clamp(40px, 12vw, 56px);
      }

      .modal-content {
        padding: 20px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <noscript>
    <p style="color: red; text-align: center; padding: 20px;">
      JavaScript is required for this app to work. Please enable JavaScript in your browser settings.
    </p>
  </noscript>

  <div class="glow" id="glow"></div>

  <!-- Notification Permission Modal -->
  <div class="modal-overlay" id="notificationModal">
    <div class="modal-content">
      <div class="modal-title">Enable Notifications?</div>
      <div class="modal-description">
        Get notified when your focus sessions and breaks are complete. We'll never share your data.
      </div>
      <div class="modal-buttons">
        <button class="modal-btn" id="notificationDeny" type="button">Not Now</button>
        <button class="modal-btn primary" id="notificationAllow" type="button">Enable Notifications</button>
      </div>
    </div>
  </div>

  <main class="card" role="main">
    <section class="presets" aria-label="Duration presets">
      <button class="preset-btn active" id="preset-25" type="button" aria-label="25 minute session">25 min</button>
      <button class="preset-btn" id="preset-50" type="button" aria-label="50 minute session">50 min</button>
      <button class="preset-btn" id="preset-10" type="button" aria-label="10 minute session">10 min</button>
    </section>

    <section class="timer-wrap" aria-label="Timer">
      <svg class="timer-svg" viewBox="0 0 200 200" aria-hidden="true">
        <circle class="ring-bg" cx="100" cy="100" r="90"></circle>
        <circle id="progress" class="ring" cx="100" cy="100" r="90" stroke="#ffffff" stroke-dasharray="565.48" stroke-dashoffset="0"></circle>
      </svg>
      <div class="center">
        <div id="time" class="time" role="status" aria-live="polite" aria-atomic="true">25:00</div>
        <div id="badge" class="badge" role="status" aria-live="polite" aria-atomic="true">FOCUS SESSION</div>
      </div>
    </section>

    <section class="actions">
      <button id="mainBtn" class="action" type="button" aria-label="Start the timer">START</button>
      <button id="resetBtn" class="icon-btn" type="button" aria-label="Reset the timer">⟲</button>
    </section>

    <section class="small-row">
      <button id="minusBtn" class="mini" type="button" aria-label="Decrease by 1 minute">-1 MIN</button>
      <button id="plusBtn" class="mini" type="button" aria-label="Increase by 1 minute">+1 MIN</button>
    </section>

    <section class="stats">
      <div class="stat-box">
        <div class="label">Completed</div>
        <div class="value" id="completedSessions">0</div>
      </div>
      <div class="stat-box">
        <div class="label">Total Time</div>
        <div class="value" id="totalTime">0h</div>
      </div>
    </section>

    <button id="clearDataBtn" class="clear-data-btn" type="button" aria-label="Clear all data including total hours">🗑 Clear All Data</button>

    <div id="note" class="footer-note" role="status" aria-live="polite" aria-atomic="true"></div>
  </main>

  <script>
    /**
     * Chronoflow - Minimalist Focus Timer
     * A distraction-free Pomodoro timer with offline support
     * Fully compatible with Brave Android (v2.1 - Fixed notifications)
     */

    // Constants
    const PRESETS = {
      25: { work: 25 * 60, break: 5 * 60, color: '#6366f1', glow: 'rgba(99,102,241,0.06)' },
      50: { work: 50 * 60, break: 10 * 60, color: '#f59e0b', glow: 'rgba(245,158,11,0.06)' },
      10: { work: 10 * 60, break: 2 * 60, color: '#06b6d4', glow: 'rgba(6,182,212,0.06)' }
    };

    const STORAGE_KEY = 'pomodoro_v4';
    const NOTIFICATION_PERMISSION_KEY = 'pomodoro_notification_decision';
    const circumference = 2 * Math.PI * 90;

    // State
    let currentPreset = 25;
    let currentPhase = 'work';
    let isActive = false;
    let timeLeft = PRESETS[25].work;
    let endTime = 0;
    let loop = null;
    let wakeLock = null;
    let completedSessions = 0;
    let totalTimeSpent = 0;
    let notificationPermissionAsked = false;

    // Utility: DOM element getter
    const $ = (id) => document.getElementById(id);

    /**
     * Display a note/message to the user
     */
    function setNote(msg, isError = false) {
      const noteEl = $('note');
      if (noteEl) {
        noteEl.textContent = msg || '';
        noteEl.classList.toggle('error', isError);
      }
    }

    /**
     * Check if notifications can be displayed
     */
    function canNotify() {
      return 'Notification' in window && Notification.permission === 'granted';
    }

    /**
     * Show a system notification
     * FIXED for Brave Android: requireInteraction set to true to keep notifications visible
     */
    function showNotification(title, body) {
      if (!canNotify()) {
        console.debug('Notifications disabled or permission not granted');
        return;
      }

      try {
        new Notification(title, {
          body,
          tag: 'chronoflow',
          badge: 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ccircle cx=%2250%22 cy=%2250%22 r=%2245%22 fill=%22%236366f1%22/%3E%3C/svg%3E',
          icon: 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ccircle cx=%2250%22 cy=%2250%22 r=%2245%22 fill=%22%236366f1%22/%3E%3Ccircle cx=%2250%22 cy=%2250%22 r=%2235%22 fill=%22none%22 stroke=%22white%22 stroke-width=%222%22/%3E%3C/svg%3E',
          requireInteraction: true
        });
        console.debug('Notification sent:', title);
      } catch (e) {
        console.error('Notification failed:', e.message);
      }
    }

    /**
     * Request notification permission and manage first-visit modal
     */
    async function requestNotificationPermission() {
      if (!('Notification' in window)) {
        setNote('Notifications not supported on this device', true);
        return false;
      }

      // If permission already decided, don't ask again
      if (Notification.permission === 'granted') return true;
      if (Notification.permission === 'denied') return false;

      // Request permission
      try {
        const result = await Notification.requestPermission();
        return result === 'granted';
      } catch (e) {
        console.error('Notification permission error:', e.message);
        setNote('Could not request notification permission', true);
        return false;
      }
    }

    /**
     * Show notification permission modal on first visit
     */
    async function showNotificationModal() {
      const hasDecision = localStorage.getItem(NOTIFICATION_PERMISSION_KEY);
      
      // If user already made a decision, don't show modal
      if (hasDecision) {
        return;
      }

      const modal = $('notificationModal');
      if (!modal) return;

      modal.classList.add('active');
      notificationPermissionAsked = true;

      return new Promise((resolve) => {
        const allowBtn = $('notificationAllow');
        const denyBtn = $('notificationDeny');

        if (allowBtn) {
          allowBtn.addEventListener('click', async () => {
            localStorage.setItem(NOTIFICATION_PERMISSION_KEY, 'requested');
            await requestNotificationPermission();
            modal.classList.remove('active');
            resolve(true);
          }, { once: true });
        }

        if (denyBtn) {
          denyBtn.addEventListener('click', () => {
            localStorage.setItem(NOTIFICATION_PERMISSION_KEY, 'denied');
            modal.classList.remove('active');
            resolve(false);
          }, { once: true });
        }
      });
    }

    /**
     * Register Service Worker for Brave Android notification support
     */
    async function registerServiceWorker() {
      if ('serviceWorker' in navigator) {
        try {
          const reg = await navigator.serviceWorker.register('/sw.js');
          console.debug('Service Worker registered successfully');
          return reg;
        } catch (e) {
          console.warn('Service Worker registration failed:', e.message);
          // App continues to work without SW
          return null;
        }
      }
      return null;
    }

    /**
     * Request screen wake lock
     */
    async function requestWake() {
      if ('wakeLock' in navigator) {
        try {
          wakeLock = await navigator.wakeLock.request('screen');
          console.debug('Wake lock acquired');
        } catch (e) {
          console.warn('Wake Lock request failed:', e.message);
        }
      }
    }

    /**
     * Release screen wake lock
     */
    async function releaseWake() {
      if (wakeLock) {
        try {
          await wakeLock.release();
          console.debug('Wake lock released');
        } catch (e) {
          console.warn('Wake Lock release failed:', e.message);
        }
        wakeLock = null;
      }
    }

    /**
     * Trigger haptic feedback (vibration)
     */
    function tryVibrate(pattern) {
      try {
        if (navigator.vibrate) {
          navigator.vibrate(pattern);
        }
      } catch (e) {
        console.debug('Vibration unavailable:', e.message);
      }
    }

    /**
     * Update the progress ring visualization
     */
    function updateRing() {
      const total = currentPhase === 'work' ? PRESETS[currentPreset].work : PRESETS[currentPreset].break;
      const offset = circumference - (Math.max(0, timeLeft) / total) * circumference;
      const progress = $('progress');
      if (progress) {
        progress.style.strokeDashoffset = offset;
      }
    }

    /**
     * Format seconds to human-readable time
     */
    function formatTime(seconds) {
      const hours = Math.floor(seconds / 3600);
      const mins = Math.floor((seconds % 3600) / 60);
      if (hours > 0) return `${hours}h${mins}m`;
      return `${mins}m`;
    }

    /**
     * Update stats display
     */
    function updateStats() {
      const completedEl = $('completedSessions');
      const totalTimeEl = $('totalTime');
      if (completedEl) completedEl.textContent = completedSessions;
      if (totalTimeEl) totalTimeEl.textContent = formatTime(totalTimeSpent);
    }

    /**
     * Clear all data
     */
    function clearAllData() {
      if (confirm('Are you sure you want to clear all data? This will reset the timer, sessions completed, and total time.')) {
        completedSessions = 0;
        totalTimeSpent = 0;
        isActive = false;
        stopLoop();
        currentPhase = 'work';
        currentPreset = 25;
        timeLeft = PRESETS[25].work;
        endTime = 0;
        releaseWake();
        localStorage.removeItem(STORAGE_KEY);
        setNote('All data cleared ✓');
        updateStats();
        render();
      }
    }

    /**
     * Render the UI with current state
     */
    function render() {
      const m = Math.floor(Math.max(0, timeLeft) / 60).toString().padStart(2, '0');
      const s = (Math.max(0, timeLeft) % 60).toString().padStart(2, '0');
      const timeEl = $('time');
      if (timeEl) {
        timeEl.textContent = `${m}:${s}`;
      }

      const cfg = PRESETS[currentPreset];
      const progressEl = $('progress');
      const badgeEl = $('badge');
      const glowEl = $('glow');

      if (currentPhase === 'work') {
        if (progressEl) progressEl.setAttribute('stroke', cfg.color);
        if (badgeEl) {
          badgeEl.textContent = 'FOCUS SESSION';
          badgeEl.style.background = 'rgba(255,255,255,0.05)';
          badgeEl.style.color = '#d4d4d8';
          badgeEl.style.borderColor = 'rgba(255,255,255,0.05)';
        }
        if (glowEl) glowEl.style.background = cfg.glow;
      } else {
        if (progressEl) progressEl.setAttribute('stroke', '#10b981');
        if (badgeEl) {
          badgeEl.textContent = 'BREAK';
          badgeEl.style.background = 'rgba(16,185,129,0.10)';
          badgeEl.style.color = '#6ee7b7';
          badgeEl.style.borderColor = 'rgba(16,185,129,0.12)';
        }
        if (glowEl) glowEl.style.background = 'rgba(16,185,129,0.06)';
      }

      const mainBtn = $('mainBtn');
      if (mainBtn) {
        mainBtn.textContent = isActive ? 'PAUSE' : 'START';
        mainBtn.classList.toggle('paused', isActive);
      }

      [25, 50, 10].forEach(v => {
        const btn = $('preset-' + v);
        if (btn) btn.classList.toggle('active', v === currentPreset);
      });

      updateRing();
    }

    /**
     * Save application state to localStorage
     */
    function saveState() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          currentPreset,
          currentPhase,
          isActive,
          timeLeft: Math.max(0, timeLeft),
          endTime,
          completedSessions,
          totalTimeSpent
        }));
      } catch (e) {
        if (e.name === 'QuotaExceededError') {
          console.warn('Storage quota exceeded');
          setNote('⚠ Storage full', true);
        } else if (e.name === 'SecurityError') {
          console.warn('LocalStorage disabled (Brave Tor or private mode)');
          setNote('⚠ Private browsing mode detected', false);
        }
      }
    }

    /**
     * Load application state from localStorage
     */
    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
          timeLeft = PRESETS[currentPreset].work;
          render();
          updateStats();
          return;
        }

        const state = JSON.parse(raw);
        currentPreset = state.currentPreset || 25;
        currentPhase = state.currentPhase || 'work';
        isActive = !!state.isActive;
        timeLeft = typeof state.timeLeft === 'number' ? Math.max(0, state.timeLeft) : PRESETS[currentPreset].work;
        endTime = typeof state.endTime === 'number' ? state.endTime : 0;
        completedSessions = typeof state.completedSessions === 'number' ? state.completedSessions : 0;
        totalTimeSpent = typeof state.totalTimeSpent === 'number' ? state.totalTimeSpent : 0;

        if (isActive && endTime > Date.now()) {
          timeLeft = Math.ceil((endTime - Date.now()) / 1000);
          startLoop();
          requestWake();
        } else if (isActive && endTime <= Date.now()) {
          catchUp();
        } else {
          isActive = false;
          timeLeft = Math.max(0, timeLeft);
        }

        render();
        updateStats();
      } catch (e) {
        console.error('Failed to load state:', e.message);
        currentPreset = 25;
        currentPhase = 'work';
        isActive = false;
        timeLeft = PRESETS[25].work;
        render();
        updateStats();
      }
    }

    /**
     * Select a preset duration
     */
    function selectPreset(minutes) {
      if (isActive) return;
      currentPreset = minutes;
      currentPhase = 'work';
      timeLeft = PRESETS[minutes].work;
      setNote('');
      saveState();
      render();
    }

    /**
     * Adjust time by delta
     */
    function adjustTime(delta) {
      if (isActive) return;
      timeLeft = Math.max(60, timeLeft + delta);
      setNote('');
      saveState();
      render();
    }

    /**
     * Start the timer loop
     */
    function startLoop() {
      stopLoop();
      loop = setInterval(() => {
        const now = Date.now();
        if (now >= endTime) {
          catchUp();
        } else {
          timeLeft = Math.ceil((endTime - now) / 1000);
          render();
        }
      }, 500);
    }

    /**
     * Stop the timer loop
     */
    function stopLoop() {
      if (loop) clearInterval(loop);
      loop = null;
    }

    /**
     * Handle timer completion and phase transitions
     */
    function catchUp() {
      const now = Date.now();

      while (isActive && now >= endTime) {
        if (currentPhase === 'work') {
          currentPhase = 'break';
          const breakDuration = PRESETS[currentPreset].break;
          endTime = endTime + (breakDuration * 1000);
          timeLeft = Math.max(0, Math.ceil((endTime - now) / 1000));
          completedSessions++;
          totalTimeSpent += PRESETS[currentPreset].work;
          tryVibrate([180, 80, 180]);
          showNotification('Chronoflow', 'Session complete. Break time started.');
          console.debug('Work session completed, break started');
        } else {
          isActive = false;
          currentPhase = 'work';
          timeLeft = PRESETS[currentPreset].work;
          endTime = 0;
          tryVibrate(300);
          showNotification('Chronoflow', 'Break complete. Ready to focus.');
          releaseWake();
          console.debug('Break completed, ready for next session');
          break;
        }
      }

      if (isActive) {
        timeLeft = Math.max(0, Math.ceil((endTime - now) / 1000));
        startLoop();
      } else {
        stopLoop();
      }

      saveState();
      render();
    }

    /**
     * Start/Pause the timer
     */
    function toggleTimer() {
      if (isActive) {
        isActive = false;
        stopLoop();
        releaseWake();
      } else {
        isActive = true;
        endTime = Date.now() + timeLeft * 1000;
        startLoop();
        requestWake();
      }
      saveState();
      render();
    }

    /**
     * Reset the timer to current preset
     */
    function resetTimer() {
      if (isActive) return;
      currentPhase = 'work';
      timeLeft = PRESETS[currentPreset].work;
      setNote('');
      saveState();
      render();
    }

    /**
     * Attach all event listeners
     */
    function attachEventListeners() {
      const mainBtn = $('mainBtn');
      const resetBtn = $('resetBtn');
      const minusBtn = $('minusBtn');
      const plusBtn = $('plusBtn');
      const clearDataBtn = $('clearDataBtn');
      const presetBtns = [25, 50, 10];

      if (mainBtn) mainBtn.addEventListener('click', toggleTimer);
      if (resetBtn) resetBtn.addEventListener('click', resetTimer);
      if (minusBtn) minusBtn.addEventListener('click', () => adjustTime(-60));
      if (plusBtn) plusBtn.addEventListener('click', () => adjustTime(60));
      if (clearDataBtn) clearDataBtn.addEventListener('click', clearAllData);

      presetBtns.forEach(minutes => {
        const btn = $(`preset-${minutes}`);
        if (btn) btn.addEventListener('click', () => selectPreset(minutes));
      });

      // Keyboard shortcuts
      document.addEventListener('keydown', (e) => {
        if (e.code === 'Space' && !isActive) {
          e.preventDefault();
          toggleTimer();
        } else if (e.key.toLowerCase() === 'r' && !isActive) {
          e.preventDefault();
          resetTimer();
        }
      });
    }

    /**
     * Initialize the application
     * FIXED: Now called on DOMContentLoaded
     */
    async function init() {
      console.debug('Initializing Chronoflow...');
      
      // Load saved state
      loadState();
      
      // Register Service Worker for Brave Android
      await registerServiceWorker();
      
      // Show notification permission modal
      await showNotificationModal();
      
      // Attach event listeners
      attachEventListeners();
      
      console.debug('Chronoflow initialized successfully');
    }

    /**
     * Start initialization when DOM is ready
     */
    document.addEventListener('DOMContentLoaded', init);

    // Fallback initialization if DOMContentLoaded has already fired
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
